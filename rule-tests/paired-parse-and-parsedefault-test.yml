id: go-parse/paired-parse-and-parsedefault
valid:
  # ParseDefault variant — not an error-returning function, not flagged
  - |
    package pkg
    func ParseOrderStatusDefault(ctx context.Context, value any, defaultValue OrderStatus) OrderStatus {
      status, err := ParseOrderStatus(ctx, value)
      if err != nil { return defaultValue }
      return *status
    }
  # Non-Parse function that returns error — not flagged
  - |
    package pkg
    func ValidateOrderStatus(ctx context.Context, value string) error {
      return nil
    }
  # Package-level variable, not a Parse* function
  - |
    package pkg
    var ParseStatusFallback = OrderStatus("pending")
invalid:
  # Parse* function with error return — LLM checks for paired Default variant
  - |
    package pkg
    func ParseOrderStatus(ctx context.Context, value any) (*OrderStatus, error) {
      s := OrderStatus("pending")
      return &s, nil
    }
  # Parse* function for primitive type — also flagged
  - |
    package pkg
    func ParseUserID(ctx context.Context, value any) (string, error) {
      return "", nil
    }
