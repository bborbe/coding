id: go-logging/no-sensitive-data-in-logs
snapshots:
  ? |
    package pkg
    import "github.com/golang/glog"
    func authenticate(password string) { glog.Infof("authenticating with password=%s", password) }
  : labels:
    - source: glog.Infof("authenticating with password=%s", password)
      style: primary
      start: 81
      end: 136
    - source: glog
      style: secondary
      start: 81
      end: 85
    - source: Infof
      style: secondary
      start: 86
      end: 91
    - source: glog.Infof
      style: secondary
      start: 81
      end: 91
    - source: password
      style: secondary
      start: 127
      end: 135
    - source: ("authenticating with password=%s", password)
      style: secondary
      start: 91
      end: 136
