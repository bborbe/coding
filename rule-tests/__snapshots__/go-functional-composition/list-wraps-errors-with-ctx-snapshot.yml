id: go-functional-composition/list-wraps-errors-with-ctx
snapshots:
  ? |
    package p
    import "context"
    func (list ProcessorList) Process(ctx context.Context) error {
        for _, p := range list {
            if err := p.Process(ctx); err != nil {
                return err
            }
        }
        return nil
    }
