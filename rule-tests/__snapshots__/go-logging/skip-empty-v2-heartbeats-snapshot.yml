      style: secondary
      start: 106
      end: 121
    - source: glog.V(2).Infof("polled %d items", n)
      style: secondary
      start: 106
      end: 143
  ? |
    package pkg
    import "github.com/golang/glog"
    func scan() {
      for {
        changed, _ := scanForUpdates()
        glog.V(2).Infof("scan cycle: %d changed", changed)
      }
    }
