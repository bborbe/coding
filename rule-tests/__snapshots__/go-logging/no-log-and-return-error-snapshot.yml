id: go-logging/no-log-and-return-error
snapshots:
  ? |
    package pkg
    import "github.com/golang/glog"
    func fetchUser(id string) error {
      err := doSomething()
      if err != nil {
        glog.Errorf("failed to fetch user %s: %v", id, err)
        return wrapf(err, "fetch user")
      }
      return nil
    }
