id: go-logging/skip-empty-v2-heartbeats
snapshots:
  ? |
    package pkg
    import "github.com/golang/glog"
    func poll() {
      for {
        n, _ := poll()
        if n > 0 {
          glog.V(2).Infof("polled %d items", n)
        }
      }
    }
  : labels:
    - source: |-
        for {
            n, _ := poll()
            if n > 0 {
              glog.V(2).Infof("polled %d items", n)
            }
          }
      style: primary
      start: 60
      end: 153
    - source: glog
      style: secondary
      start: 106
      end: 110
    - source: V
